<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — Bot Lexicon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .btn {
      background: #21262D;
      border: 1px solid #30363D;
      color: #C8CBD8;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #2D333B; border-color: #444C56; }
    .btn-vat { background: #00E678; color: #0D1117; border: none; font-weight: 600; }
    .btn-vat:hover { background: #00C868; color: #0D1117; }
    body {
      background: #0D1117;
      color: #C8CBD8;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #161B22;
      border-bottom: 1px solid #21262D;
      flex-shrink: 0;
    }
    #header h1 { font-size: 16px; font-weight: 600; color: #E6EDF3; }
    .back-btn {
      color: #00E678;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { text-decoration: underline; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      overflow: hidden;
    }

    /* Left Column: Charts */
    #sidebar {
      padding: 24px;
      background: #0D1117;
      border-right: 1px solid #21262D;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .chart-box h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8B949E;
      margin-bottom: 16px;
    }
    .chart-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 18px;
    }
    .bar-label {
      width: 60px;
      font-size: 10px;
      color: #8B949E;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
    }
    .bar-wrap {
      flex: 1;
      background: #161B22;
      height: 12px;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      transition: width 0.6s ease-out;
    }
    .bar-mauk { background: #03A6A1; }
    .bar-abaci { background: #FF9D23; }
    .bar-both { background: #00E678; }
    .bar-val {
      font-size: 9px;
      color: #C8CBD8;
      width: 40px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Right Column: Word List */
    #content {
      display: flex;
      flex-direction: column;
      background: #161B22;
      overflow: hidden;
    }
    #list-header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262D;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #search-box {
      background: #0D1117;
      border: 1px solid #30363D;
      color: #E6EDF3;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      width: 240px;
      outline: none;
    }
    #search-box:focus { border-color: #00E678; }
    
    #word-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    .word-row {
      display: grid;
      grid-template-columns: 40px 1fr 100px 100px;
      padding: 8px 24px;
      border-bottom: 1px solid #21262D;
      align-items: center;
      font-size: 13px;
    }
    .word-row:hover { background: #1C2128; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-mauk { background: #03A6A1; }
    .dot-abaci { background: #FF9D23; }
    .dot-equal { background: #00E678; }
    .word-text { font-family: 'JetBrains Mono', monospace; color: #E6EDF3; }
    .cnt-m { color: #03A6A1; text-align: right; }
    .cnt-a { color: #FF9D23; text-align: right; }
    
    #stats-summary {
      font-size: 12px;
      color: #8B949E;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444C56; }
  </style>
</head>
<body>

<div id="header">
  <div style="display:flex; align-items:center; gap:20px;">
    <a href="index.html" class="back-btn">← Back to Visualizer</a>
    <h1>Lexicon Results</h1>
  </div>
  <div style="display:flex; align-items:center; gap:16px;">
    <div id="stats-summary">
      Jaccard: <b id="jaccard-val">0%</b>
    </div>
    <button class="btn btn-vat" onclick="window.location.href='https://vat.social'">Enter the VAT</button>
  </div>
</div>

<main>
  <div id="sidebar">
    <div class="chart-box">
      <h3>MAUK Distribution</h3>
      <div class="chart-container" id="chart-mauk"></div>
    </div>
    <div class="chart-box">
      <h3>Shared (Both) Distribution</h3>
      <div class="chart-container" id="chart-both"></div>
    </div>
    <div class="chart-box">
      <h3>ABACI Distribution</h3>
      <div class="chart-container" id="chart-abaci"></div>
    </div>
    <div class="chart-box">
      <h3>Morphology</h3>
      <img src="assets/hapax_morphology.png" alt="Morphology" style="width:100%; border-radius:8px; opacity:0.8;">
    </div>
  </div>

  <div id="content">
    <div id="list-header">
      <div style="font-size:13px; color:#8B949E;">
        Top <b id="word-count-showing">0</b> words <span id="word-total-count"></span>
      </div>
      <input type="text" id="search-box" placeholder="Search vocabulary...">
    </div>
    <div id="word-list">
      <!-- populated by js -->
    </div>
  </div>
</main>

<script>
let ALL_WORDS = [];
let STATS = {};

async function loadData() {
  const [wRes, sRes] = await Promise.all([
    fetch('words.json'),
    fetch('stats.json')
  ]);
  ALL_WORDS = await wRes.json();
  STATS     = await sRes.json();
  
  renderResults();
}

function renderResults() {
  document.getElementById('jaccard-val').textContent = (STATS.jaccard * 100).toFixed(2) + '%';
  
  renderChart('chart-mauk',  STATS.distributions.mauk,  'bar-mauk');
  renderChart('chart-both',  STATS.distributions.both,  'bar-both');
  renderChart('chart-abaci', STATS.distributions.abaci, 'bar-abaci');
  
  updateWordList();
}

function renderChart(id, data, cls) {
  const container = document.getElementById(id);
  const max = Math.max(...data.map(d => d.unique));
  
  container.innerHTML = data.map(d => {
    const pct = (d.unique / max) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label">${d.label}</div>
        <div class="bar-wrap">
          <div class="bar-fill ${cls}" style="width: ${pct}%"></div>
        </div>
        <div class="bar-val">${d.unique.toLocaleString()}</div>
      </div>
    `;
  }).join('');
}

function updateWordList(filter = '') {
  const container = document.getElementById('word-list');
  const search = filter.toLowerCase();
  
  let filtered = ALL_WORDS;
  if (search) {
    filtered = ALL_WORDS.filter(w => w.w.includes(search));
  }
  
  // limit to top 10k for performance
  const limit = 2000; 
  const display = filtered.slice(0, limit);
  
  document.getElementById('word-count-showing').textContent = display.length.toLocaleString();
  document.getElementById('word-total-count').textContent = `of ${filtered.length.toLocaleString()}`;

  container.innerHTML = display.map(w => {
    let dotClass = 'dot-equal';
    if (w.m > w.a) dotClass = 'dot-mauk';
    else if (w.a > w.m) dotClass = 'dot-abaci';
    
    return `
      <div class="word-row">
        <div class="dot ${dotClass}"></div>
        <div class="word-text">${w.w}</div>
        <div class="cnt-m">${w.m ? w.m.toLocaleString() : '—'}</div>
        <div class="cnt-a">${w.a ? w.a.toLocaleString() : '—'}</div>
      </div>
    `;
  }).join('');
}

document.getElementById('search-box').addEventListener('input', (e) => {
  updateWordList(e.target.value);
});

loadData();
</script>
</body>
</html>
